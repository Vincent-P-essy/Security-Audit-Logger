version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: security-audit-logger-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=SecurityAuditLogger;User Id=sa;Password=DevPassword@123;TrustServerCertificate=true;
      - Jwt__Secret=dev-secret-key-do-not-use-in-production-must-be-32-chars
      - Jwt__Issuer=SecurityAuditLogger
      - Jwt__Audience=SecurityAuditLogger
    depends_on:
      db:
        condition: service_healthy
    networks:
      - audit-net
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: security-audit-logger-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=DevPassword@123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "DevPassword@123", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - audit-net

volumes:
  sqldata:

networks:
  audit-net:
    driver: bridge
